services:
  database:
    image: postgres:18-alpine
    container_name: knowledge_management_app_database
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker

volumes:
  postgres_data:
